services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - redteam_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  juiceshop:
    image: bkimminich/juice-shop:latest
    ports:
      - "${JUICE_SHOP_PORT:-8080}:3000"
    networks:
      - redteam_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  redis_data:


networks:
  redteam_net:
    driver: bridge
