[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async settings - auto mode allows async tests without explicit @pytest.mark.asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
testpaths = tests
addopts = 
    --strict-markers
    -ra
    --tb=short
    --ignore=tests/test_integration.py

# Custom markers
markers =
    critical: Critical bug tests (break functionality)
    high: High priority bug tests
    medium: Medium priority feature tests
    regression: Regression tests
    slow: Slow tests (integration tests)
    unit: Fast unit tests
    integration: Integration tests requiring external services
    redis: Tests requiring Redis
    supabase: Tests requiring Supabase
    qdrant: Tests requiring Qdrant

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestCollectionWarning

# Coverage settings (when using --cov)
[run]
source = agents, core, sandbox
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
